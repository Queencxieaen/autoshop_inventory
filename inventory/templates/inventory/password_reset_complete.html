<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset Complete</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg text-center">

    <h2 class="text-xl font-semibold text-green-600 mb-4">
      Password Changed Successfully
    </h2>

    <p class="text-sm text-gray-600 mb-6">
      Your password has been updated. You can now log in with your new credentials.
    </p>

    <a href="{% url 'login' %}"
       class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg
              hover:bg-indigo-700 transition">
      Go to Login
    </a>

  </div>

</body>
</html>
