

{% block title %}Login - Autosthetics{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card border-0 shadow-lg p-4" style="width: 400px; border-radius: 12px;">
        
        <!-- Logo / Title -->
        <div class="text-center mb-3">
            <h4 class="fw-bold">Autosthetics</h4>
            <p class="text-muted small mb-0">Inventory System</p>
        </div>

        <h5 class="text-center mb-4 fw-semibold">Welcome Back 👋</h5>

        <!-- Alerts -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show small" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% if error %}
            <div class="alert alert-danger small">{{ error }}</div>
        {% endif %}

        <!-- Form -->
        <form method="POST" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Username</label>
                <input type="text" name="username" id="username"
                       class="form-control form-control-lg"
                       placeholder="Enter your username" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label small fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password"
                           class="form-control form-control-lg"
                           placeholder="Enter your password" required>
                    <span class="input-group-text bg-white" style="cursor:pointer;" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eye-icon"></i>
                    </span>
                </div>
            </div>

            <!-- Remember -->
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label small" for="remember">Remember Me</label>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-primary w-100 fw-semibold" style="border-radius: 8px;">
                Login
            </button>

            <!-- Forgot -->
            <div class="mt-3 text-center">
                <a href="{% url 'send_otp' %}" class="text-decoration-none small text-primary">
                    Forgot Password?
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Styles -->
<style>
.form-control:focus {
    border-color: #1d4ed8;
    box-shadow: 0 0 0 0.15rem rgba(29, 78, 216, 0.2);
}

.card {
    transition: 0.2s ease;
}

.card:hover {
    transform: translateY(-2px);
}
</style>

<!-- Script -->
<script>
function togglePassword() {
    const password = document.getElementById('password');
    const icon = document.getElementById('eye-icon');

    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
{% endblock %}
