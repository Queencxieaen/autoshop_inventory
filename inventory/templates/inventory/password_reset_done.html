<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg text-center">

    <h2 class="text-xl font-semibold text-gray-800 mb-4">
      Password Reset Sent
    </h2>

    <p class="text-sm text-gray-600 mb-6">
      If an account exists with the email you provided, we have sent a password reset link.
      Please check your inbox and spam folder.
    </p>

    <div class="bg-green-100 text-green-700 p-3 rounded-lg mb-6">
      ✔ If your email exists in our system, instructions were sent.
    </div>

    <a href="{% url 'login' %}"
       class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg
              hover:bg-indigo-700 transition">
      Back to Login
    </a>

  </div>

</body>
</html>
