{% extends "inventory/base.html" %}
{% load static %}

{% block content %}
<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div>
        <label for="id_shop_name">Shop Name:</label>
        {{ form.shop_name }}
    </div>

    <div>
        <label for="id_theme">Theme:</label>
        {{ form.theme }}
    </div>

    <div>
        <label for="id_profile_image">Profile Image:</label>
        {{ form.profile_image }}
    </div>

    <!-- Live Preview -->
    <div style="margin-top: 10px;">
        <img id="profilePreview" src="{% if request.user.shopsettings.profile_image %}{{ request.user.shopsettings.profile_image.url }}{% else %}{% static 'images/default_profile.png' %}{% endif %}" 
             alt="Profile Preview" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid #ccc;">
    </div>

    <button type="submit" style="margin-top: 15px;">Save Changes</button>
</form>

<!-- Live preview script -->
<script>
    const input = document.getElementById('id_profile_image');
    const preview = document.getElementById('profilePreview');

    input.addEventListener('change', function(event) {
        const [file] = input.files;
        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    });
</script>

{% endblock %}
